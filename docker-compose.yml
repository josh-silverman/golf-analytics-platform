# Local dev stack for the PGA Tour Analytics Platform.
# `docker compose up` boots api + postgres + redis + frontend with live reload.
# Production deploys use Fly.io (backend) + Vercel (frontend) and don't use
# this file — see docs/architecture/03-integration-and-deployment.md §4.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pga
      POSTGRES_PASSWORD: pga
      POSTGRES_DB: pga
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pga -d pga"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      target: dev
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+asyncpg://pga:pga@postgres:5432/pga
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Named volume masks the host .venv (built for darwin) so the linux
      # .venv inside the container is preserved
      - backend_venv:/app/.venv

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      # Vite's dev-server proxy reads this; falls back to localhost outside docker.
      API_TARGET: http://api:8000
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Same node_modules-masking pattern as the backend .venv
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_venv:
  frontend_node_modules:
